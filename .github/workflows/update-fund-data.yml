name: 每日更新基金数据（v7靠谱指数）

on:
  # 定时触发：北京时间每天 21:30（UTC 13:30）
  schedule:
    - cron: '30 13 * * *'
  # 手动触发
  workflow_dispatch:
    inputs:
      skip_risk:
        description: '跳过风险指标计算（仅更新收益排位靠谱分）'
        required: false
        type: boolean
        default: false

env:
  PYTHONUNBUFFERED: '1'

jobs:
  update-fund-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_MGMT_TOKEN: ${{ secrets.SUPABASE_MGMT_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 验证环境变量
        run: |
          if [ -z "$SUPABASE_MGMT_TOKEN" ]; then
            echo "ERROR: SUPABASE_MGMT_TOKEN 未设置！请在 GitHub Secrets 中配置。"
            exit 1
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "ERROR: SUPABASE_ANON_KEY 未设置！请在 GitHub Secrets 中配置。"
            exit 1
          fi
          echo "Supabase URL: $SUPABASE_URL"
          echo "Project Ref: $SUPABASE_PROJECT_REF"
          echo "MGMT_TOKEN 已配置: ${#SUPABASE_MGMT_TOKEN} 字符"
          echo "ANON_KEY 已配置: ${#SUPABASE_ANON_KEY} 字符"

      - name: 步骤1 — 拉取天天基金全量数据（输出 NDJSON）
        run: |
          echo "============================================"
          echo "  步骤1: 拉取天天基金 + 计算收益靠谱分"
          echo "  开始时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "============================================"
          python scripts/fetch_and_import_funds.py --output-only

      - name: 步骤2 — 抓取风险指标（回撤+夏普）
        if: ${{ !inputs.skip_risk }}
        id: risk_indicators
        timeout-minutes: 12
        continue-on-error: true
        run: |
          echo "============================================"
          echo "  步骤2: 抓取风险指标 (回撤+夏普比率)"
          echo "  开始时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "============================================"
          # 先检查是否有第一步输出的 NDJSON
          if [ ! -f scripts/funds_output.ndjson ]; then
            echo "未找到 funds_output.ndjson，跳过风险指标计算"
            exit 0
          fi
          python scripts/fetch_risk_indicators.py \
            --input scripts/funds_output.ndjson \
            --output scripts/risk_indicators.ndjson \
            --workers 8 \
            --delay 0.3 \
            --resume
          echo "风险指标计算完成: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: 步骤2b — 抓取成立以来收益率（rankhandler API）
        if: ${{ !inputs.skip_risk }}
        timeout-minutes: 10
        continue-on-error: true
        run: |
          echo "============================================"
          echo "  步骤2b: 抓取成立以来收益率 (rankhandler API)"
          echo "  开始时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "============================================"
          python scripts/fetch_return_all.py scripts/return_all.ndjson 0.3
          echo "成立以来收益率抓取完成: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: 步骤2c — 导出基金详情（公司/规模/费率）
        if: ${{ !inputs.skip_risk }}
        timeout-minutes: 5
        run: |
          echo "============================================"
          echo "  步骤2c: 导出基金详情 (公司/规模/费率)"
          echo "  开始时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "============================================"
          pip install requests
          python scripts/export_fund_details.py scripts/fund_details.ndjson
          echo "基金详情导出完成: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: 步骤3 — 合并风险指标 + 重新计算靠谱分 + REST API 导入 Supabase
        if: ${{ !inputs.skip_risk }}
        run: |
          echo "============================================"
          echo "  步骤3: 合并风险指标 + 重算靠谱分 + REST API 导入"
          echo "  开始时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "============================================"
          # 风险指标失败时走备选：仅收益靠谱分
          if [ "${{ steps.risk_indicators.outcome }}" = "failure" ]; then
            echo "[WARN] 风险指标抓取超时/失败，跳过合并，仅使用收益靠谱分"
          fi
          python scripts/import_via_rest.py

      - name: 步骤3b — HSPJ 基金分类更新（基于聚源标准）
        if: ${{ !inputs.skip_risk }}
        run: |
          echo "============================================"
          echo "  步骤3b: HSPJ 分类更新 (聚源基金分类标准)"
          echo "============================================"
          python scripts/classify_hspj_from_json.py

      - name: 步骤3c — 同步 fund_scores → fund_combined
        run: |
          echo "============================================"
          echo "  步骤3c: 同步评分到 fund_combined"
          echo "============================================"
          python scripts/sync_fund_combined_scores.py

      - name: 步骤3-alt — 仅收益靠谱分 REST API 导入（跳过风险指标）
        if: ${{ inputs.skip_risk }}
        run: |
          echo "============================================"
          echo "  步骤3-alt: 仅收益靠谱分 + REST API 导入"
          echo "  开始时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "============================================"
          python scripts/import_via_rest.py

      - name: 步骤4 — 验证数据
        run: |
          echo "============================================"
          echo "  步骤4: 验证数据完整性"
          echo "  完成时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "============================================"
          python scripts/verify_update.py

      - name: 步骤5 — 导出 fund_combined.xlsx
        run: |
          echo "============================================"
          echo "  步骤5: 导出 fund_combined.xlsx"
          echo "  开始时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "============================================"
          pip install openpyxl requests
          python scripts/export_fund_combined.py --output public/fund_combined.xlsx
          echo "文件大小: $(ls -lh public/fund_combined.xlsx | awk '{print $5}')"
          echo "导出完成: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: 步骤5b — 导出全部数据表到数据中心
        run: |
          echo "============================================"
          echo "  步骤5b: 导出全部11张表到 public/downloads/"
          echo "  开始时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "============================================"
          mkdir -p public/downloads
          python scripts/export_all_tables.py --output-dir public/downloads
          echo "导出完成: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: 步骤6 — 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 步骤6b — 安装依赖并构建
        run: |
          echo "============================================"
          echo "  步骤6: 安装依赖 + 构建站点"
          echo "============================================"
          npm install
          npx vite build
          echo "构建完成: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: 步骤7 — 打包并部署到 EdgeOne Pages
        env:
          EDGEONE_PAGES_TOKEN: ${{ secrets.EDGEONE_PAGES_TOKEN }}
        run: |
          echo "============================================"
          echo "  步骤7: 打包并部署到 EdgeOne Pages"
          echo "============================================"
          rm -f dist.zip
          cd dist && zip -r ../dist.zip . && cd ..
          npx edgeone pages deploy dist.zip -n allfund -t "$EDGEONE_PAGES_TOKEN"
          echo "部署完成: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: 失败通知
        if: ${{ failure() || cancelled() }}
        run: |
          echo "数据更新失败！请检查 GitHub Actions 日志。"
          echo "时间: $(date '+%Y-%m-%d %H:%M:%S')"
